<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffer de Atendimentos | Lebes</title>

    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="app-header">
        <div class="header-left">
            <img src="img/logolebes.png" alt="Lebes Logo" class="app-logo">
            <nav class="top-nav">
                <button class="nav-btn active" onclick="switchTab('buffer')">📋 Buffer</button>
                <button class="nav-btn" onclick="switchTab('aprimorar')">✨ Aprimorar Textos</button>
            </nav>
        </div>
        <button id="themeToggle" title="Alternar Tema">🌙</button>
    </header>

    <div class="main-container">

        <section id="buffer" class="page-section active">
            <div class="header-actions">
                <h2>Buffer de Atendimentos</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-exportar" onclick="exportToCSV()" title="Baixar histórico em Excel">
                        <span style="margin-right: 8px;">📊</span> Exportar Backup
                    </button>
                    <button class="btn-limpar-tudo" onclick="clearAll()">
                        <span style="margin-right: 8px;">🗑️</span> Limpar Dia
                    </button>
                </div>
            </div>

            <div class="shortcuts-bar">
                <span class="shortcut-label">⚡ Templates Rápidos:</span>
                <select class="template-dropdown"
                    onchange="if(this.selectedIndex > 0) { applyTemplate(this.options[this.selectedIndex].dataset.prob, this.options[this.selectedIndex].dataset.sol); this.selectedIndex = 0; }">
                    <option value="">Selecione um atendimento...</option>
                    <option data-prob="Loja entrou em contato informando PDV Travado."
                        data-sol="Foi necessário reconfigurar PDV via linha de comando (config.sh). Equipamento voltou a funcionar normalmente.">
                        PDV Travado</option>
                    <option
                        data-prob="Loja entrou em contato informando que todos os PDVs estão com erro ao resgatar vendas."
                        data-sol="Ajustado ao iniciar serviço responsável pelo resgate no servidor da loja. Resgates normalizados.">
                        Resgate Venda - Erro</option>
                    <option data-prob="Todas as pré vendas com erro de conexão com as bases."
                        data-sol="Ajustado ao acessar servidor da loja e reiniciar bases. Acesso normalizado em todas as pré vendas.">
                        Erro Conexão PV</option>
                    <option data-prob="Loja entrou em contato solicitando senha de acesso ao Portal Nexoh."
                        data-sol="Loja encaminhada ao time de NOC para ajuste.">Senha Nexoh</option>
                    <option data-prob="Contato referente a instabilidade no pagamento via PIX."
                        data-sol="Loja orientada sobre a instabilidade geral. Solicitado clicar em 'Voltar' para estornar o valor e aguardar a correção. Em caso de falha no estorno, a orientação é acionar o time do Financeiro diretamente.">
                        Instabilidade PIX</option>
                    <option data-prob="Loja entrou em contato informando estar sem internet."
                        data-sol="Validado e loja realmente está sem internet. Solicitado para filial entrar em contato com o setor de NOC via WhatsApp.">
                        Loja Sem Internet</option>
                    <option data-prob="Em meio ao atendimento, ligação acabou caindo."
                        data-sol="Em meio ao atendimento, ligação acabou caindo.">Ligação Caiu</option>
                    <option data-prob="Filial entrou em contato, porém acabou desistindo."
                        data-sol="Realizada tentativa de callback, porém caiu na caixa postal.">Callback</option>
                    <option data-prob="Loja com problema ao acessar e-mail."
                        data-sol="Realizada tentativa de acesso com senhas salvas, porém sem sucesso. Encaminhado para o time de NOC.">
                        Acesso Email - NOC</option>
                </select>
            </div>

            <form id="ticketForm" class="form-group">
                <div class="input-group input-filial-group">
                    <label for="filial">Filial</label>
                    <input type="text" id="filial" placeholder="Ex: 247" maxlength="3" required autofocus>
                </div>
                <div class="input-group input-origem-group">
                    <label for="acionamento">Origem</label>
                    <select id="acionamento" required>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Telefone">Telefone</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="problema">Problema Relatado</label>
                    <input type="text" id="problema" placeholder="Descreva o problema..." required>
                </div>
                <div class="input-group">
                    <label for="solucao">Solução Aplicada</label>
                    <input type="text" id="solucao" placeholder="O que foi feito...">
                </div>
                <div class="input-group input-filial-group">
                    <label for="pdv">PDV</label>
                    <input type="text" id="pdv" placeholder="Ex: 01" maxlength="2">
                </div>
                <button type="submit" id="btnSalvar">Salvar (Enter)</button>
            </form>

            <div class="dashboard-stats">
                <div class="stat-card">
                    <span class="stat-title">Total</span>
                    <span class="stat-value" id="countTotal">0</span>
                </div>
                <div class="stat-card stat-chat">
                    <span class="stat-title">WhatsApp</span>
                    <span class="stat-value" id="countChat">0</span>
                </div>
                <div class="stat-card stat-fone">
                    <span class="stat-title">Telefone</span>
                    <span class="stat-value" id="countFone">0</span>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Filial</th>
                        <th style="width: 105px;">Origem</th>
                        <th>Problema <span style="font-size: 10px; font-weight: normal;">(Editável)</span></th>
                        <th>Solução <span style="font-size: 10px; font-weight: normal;">(Editável)</span></th>
                        <th style="width: 80px;">PDV <span
                                style="font-size: 10px; font-weight: normal;">(Editável)</span></th>
                        <th style="width: 120px; text-align: center;">Status</th>
                        <th style="width: 185px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>

        <section id="aprimorar" class="page-section">
            <div class="header-actions">
                <h2>Aprimoramento de Comunicação</h2>
            </div>

            <div class="ai-container">
                <div class="ai-box">
                    <label for="draftInput">Seu Rascunho Bruto:</label>
                    <textarea id="draftInput" rows="4"
                        placeholder="Ex: ola em anexo segunda via de contrato como solicitado."></textarea>
                </div>

                <button class="btn-ai-generate" onclick="formatarRegistro()">
                    <span style="margin-right: 5px;">🪄</span> Aplicar Padrão Lebes
                </button>

                <div class="ai-box">
                    <label for="finalOutput">Resultado Aprimorado (Pronto para envio):</label>
                    <textarea id="finalOutput" rows="7" readonly placeholder="O resultado aparecerá aqui..."></textarea>
                </div>

                <button class="btn-copy" id="btnCopyAi"
                    style="align-self: flex-start; padding: 10px 20px; font-size: 14px; border-radius: 6px;"
                    onclick="copiarAprimorado()">Copiar Texto</button>
            </div>
        </section>

    </div>

    <footer class="app-footer">
        <p id="bible-verse" class="verse-text">"Carregando versículo..."</p>
        <p>&copy; 2026 Samuel Saraiva. Todos os direitos reservados. | Buffer de Atendimentos Lebes</p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
